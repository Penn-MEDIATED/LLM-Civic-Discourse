      { value: "year-desc", label: "Year (newest)" },
      { value: "year-asc", label: "Year (oldest)" },
      { value: "title-asc", label: "Title (A\u2013Z)" },
      { value: "title-desc", label: "Title (Z\u2013A)" },
    ];

    const TAG_COLORS = {
      "Political Bias & Ideology":        { bg: "#f0eef8", border: "#5a3ea0", text: "#4a2e88" },
      "Censorship & Content Moderation":  { bg: "#fdf0ec", border: "#c0522a", text: "#9a3e1e" },
      "Persuasion & Political Influence": { bg: "#fdf7e8", border: "#b08020", text: "#8a6010" },
      "Misinformation & Fact-Checking":   { bg: "#fdf0f0", border: "#b83a3a", text: "#922a2a" },
      "Democracy & Public Deliberation":  { bg: "#eef2f8", border: "#3a68aa", text: "#2a5088" },
      "User Behavior & Information Effects": { bg: "#eef7f5", border: "#2a8a7a", text: "#1e6e62" },
      "Benchmarks & Evaluation":          { bg: "#f2f5ee", border: "#4a7a2e", text: "#3a6020" },
    };

    function getTagStyle(tag) {
      return TAG_COLORS[tag] || { bg: "#f4f4f2", border: "#888", text: "#555" };
    }

    function Dashboard() {
      const [sort, setSort] = useState("year-desc");
      const [activeTags, setActiveTags] = useState([]);
      const [search, setSearch] = useState("");
      const [expandedId, setExpandedId] = useState(null);

      const toggleTag = (tag) => {
        setActiveTags((prev) =>
          prev.includes(tag) ? prev.filter((t) => t !== tag) : [...prev, tag]
        );
      };

      const filtered = useMemo(() => {
        let result = papers;
        if (activeTags.length > 0) {
          result = result.filter((p) =>
            activeTags.some((t) => p.tags.includes(t))
          );
        }
        if (search.trim()) {
          const q = search.toLowerCase();
          result = result.filter(
            (p) =>
              p.title.toLowerCase().includes(q) ||
              p.authors.toLowerCase().includes(q) ||
              p.summary.toLowerCase().includes(q) ||
              p.journal.toLowerCase().includes(q)
          );
        }
        const [field, dir] = sort.split("-");
        result = [...result].sort((a, b) => {
          if (a.pinned && !b.pinned) return -1;
          if (!a.pinned && b.pinned) return 1;
          if (a.new && !b.new) return -1;
          if (!a.new && b.new) return 1;
          let cmp;
          if (field === "year") cmp = a.year - b.year;
          else if (field === "title") cmp = a.title.localeCompare(b.title);
          else cmp = a.authors.localeCompare(b.authors);
          return dir === "desc" ? -cmp : cmp;
        });
        return result;
      }, [activeTags, search, sort]);

      return (
        <div style={{ minHeight: "100vh" }}>
          {/* Header */}
          <header style={{
            borderBottom: "2px solid #1e3a5c",
            background: "#fff",
          }}>
            <div className="dashboard-container header-inner" style={{ maxWidth: 1600, margin: "0 auto", paddingTop: 52, paddingBottom: 36 }}>
              <p style={{
                fontFamily: "'Libre Franklin', sans-serif",
                fontSize: 11,
                letterSpacing: "3.5px",
                textTransform: "uppercase",
                color: "#1e3a5c",
                marginBottom: 12,
                fontWeight: 600,
              }}>Project Dashboard</p>
              <h1 style={{
                fontFamily: "'Source Serif 4', Georgia, serif",
                fontSize: "clamp(30px, 4vw, 46px)",
                fontWeight: 700,
                lineHeight: 1.12,
                margin: 0,
                color: "#1a1a18",
                maxWidth: 700,
              }}>
                LLMs and Civic Discourse
              </h1>
              <div className="header-flex" style={{ display: "flex", alignItems: "flex-start", gap: 32, marginTop: 14, flexWrap: "wrap" }}>
                <p style={{
                  fontFamily: "'Libre Franklin', sans-serif",
                  fontSize: 17,
                  color: "#6b6860",
                  margin: 0,
                  maxWidth: 800,
                  lineHeight: 1.7,
                  fontWeight: 300,
                  flex: "1 1 340px",
                }}>
                  Containing {papers.length} papers, this dashboard highlights recent research on how large language models (LLMs) shape civic discourse. The collection includes empirical studies examining political bias in LLM outputs, longitudinal audits tracking how LLMs handle political content over time, and experimental research testing how LLMs affect learning outcomes and political beliefs. It also features papers investigating trends in automated content moderation, including refusal patterns and potential speech suppression for different identity groups. Several papers explore whether and how LLMs might support democratic processes—from improving online political conversations to assisting with democratic deliberation. Together, these papers serve as a helpful primer for understanding current research on how LLMs are shaping political communication and civic participation.
                </p>
                <div className="convening-block" style={{ flex: "0 0 320px", display: "flex", flexDirection: "column", gap: 10, background: "#f0f4f9", border: "1px solid #c8d6e8", borderLeft: "4px solid #1e3a5c", borderRadius: 8, padding: "14px 18px" }}>
                  <h3 style={{
                    fontFamily: "'Source Serif 4', Georgia, serif",
                    fontSize: 18,
                    fontWeight: 700,
                    color: "#1e3a5c",
                    margin: 0,
                    lineHeight: 1.2,
                  }}>
                    Convening on LLMs and Civic Discourse
                  </h3>
                  <p style={{
                    fontFamily: "'Libre Franklin', sans-serif",
                    fontSize: 14,
                    color: "#6b6860",
                    margin: 0,
                    lineHeight: 1.55,
                    fontWeight: 300,
                  }}>
                    On March 4th, Penn MEDIATED hosted an online convening of prominent academic researchers and civil society organizations to share results from, and approaches to, monitoring and evaluating LLM civic discourse—how LLMs discuss political topics, refer to politicians, and relate election information. You can see the topic primer for that convening below.
                  </p>
                  <a
                    href="LLM Civic Discourse Convening - Topic Primer.pdf"
                    target="_blank"
                    rel="noopener noreferrer"
                    style={{
                      display: "inline-flex",
                      alignItems: "center",
                      gap: 10,
                      alignSelf: "flex-start",
                      padding: "8px 16px",
                      background: "#1e3a5c",
                      color: "#fff",
                      borderRadius: 8,
                      textDecoration: "none",
                      fontFamily: "'Libre Franklin', sans-serif",
                      fontSize: 13,
                      fontWeight: 500,
                      lineHeight: 1.4,
                      boxShadow: "0 2px 8px rgba(30,58,92,0.18)",
                      transition: "background 0.2s, box-shadow 0.2s",
                    }}
                    onMouseEnter={e => { e.currentTarget.style.background = "#16304e"; e.currentTarget.style.boxShadow = "0 4px 14px rgba(30,58,92,0.28)"; }}
                    onMouseLeave={e => { e.currentTarget.style.background = "#1e3a5c"; e.currentTarget.style.boxShadow = "0 2px 8px rgba(30,58,92,0.18)"; }}
                  >
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{ flexShrink: 0 }}>
                      <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/>
                    </svg>
                    LLM Civic Discourse – Topic Primer
                  </a>
                </div>
                <div className="convening-block" style={{ flex: "0 0 480px", display: "flex", flexDirection: "column", gap: 10, background: "#f0f4f9", border: "1px solid #c8d6e8", borderLeft: "4px solid #1e3a5c", borderRadius: 8, padding: "14px 18px" }}>
                  <h3 style={{
                    fontFamily: "'Source Serif 4', Georgia, serif",
                    fontSize: 18,
                    fontWeight: 700,
                    color: "#1e3a5c",
                    margin: 0,
                    lineHeight: 1.2,
                  }}>
                    Research Grants on LLM Civic Discourse
                  </h3>
                  <p style={{
                    fontFamily: "'Libre Franklin', sans-serif",
                    fontSize: 14,
                    color: "#6b6860",
                    margin: 0,
                    lineHeight: 1.55,
                    fontWeight: 300,
                  }}>
                    In 2026, Penn MEDIATED funded four grants to expand Penn's research on this essential topic:
                  </p>
                  <ul style={{
                    fontFamily: "'Libre Franklin', sans-serif",
                    fontSize: 13.5,
                    color: "#6b6860",
                    fontWeight: 300,
                    lineHeight: 1.55,
                    paddingLeft: 18,
                    margin: 0,
                    display: "flex",
                    flexDirection: "column",
                    gap: 6,
                  }}>
                    <li>AI Watchman: Longitudinally Auditing Generative AI Content Moderation of Social Issues</li>
                    <li>Adversarial Testing of Misalignment in Frontier LLMs: When Asked to Create Anti-Democratic Campaign Materials</li>
                    <li>Information Density and Narrative Persuasion in AI Chatbots: Cross-National Evidence from India and the United States</li>
                    <li>How AI Transforms News: Measuring Bias and Distortion During LLM Conversations</li>
                  </ul>
                  <a
                    href="http://infodem.upenn.edu/grants"
                    target="_blank"
                    rel="noopener noreferrer"
                    style={{
                      display: "inline-flex",
                      alignItems: "center",
                      gap: 10,
                      alignSelf: "flex-start",
                      padding: "8px 16px",
                      background: "#1e3a5c",
                      color: "#fff",
                      borderRadius: 8,
                      textDecoration: "none",
                      fontFamily: "'Libre Franklin', sans-serif",
                      fontSize: 13,
                      fontWeight: 500,
                      lineHeight: 1.4,
                      boxShadow: "0 2px 8px rgba(30,58,92,0.18)",
                      transition: "background 0.2s, box-shadow 0.2s",
                    }}
                    onMouseEnter={e => { e.currentTarget.style.background = "#16304e"; e.currentTarget.style.boxShadow = "0 4px 14px rgba(30,58,92,0.28)"; }}
                    onMouseLeave={e => { e.currentTarget.style.background = "#1e3a5c"; e.currentTarget.style.boxShadow = "0 2px 8px rgba(30,58,92,0.18)"; }}
                  >
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{ flexShrink: 0 }}>
                      <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/>
                    </svg>
                    Penn MEDIATED Research Grants
                  </a>
                </div>
              </div>
            </div>
          </header>

          {/* Controls */}
          <div className="dashboard-container" style={{ maxWidth: 1600, margin: "0 auto", paddingTop: 28, paddingBottom: 0 }}>
            <div style={{ display: "flex", gap: 16, flexWrap: "wrap", marginBottom: 20, alignItems: "center" }}>
              <div style={{ position: "relative", flex: "1 1 280px", maxWidth: 420 }}>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#9a9690" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" style={{ position: "absolute", left: 14, top: "50%", transform: "translateY(-50%)" }}>
                  <circle cx="11" cy="11" r="8" /><path d="m21 21-4.35-4.35" />
                </svg>
                <input
                  type="text"
                  placeholder="Search titles, authors, or content."
                  value={search}
                  onChange={(e) => setSearch(e.target.value)}
                  style={{
                    width: "100%",
                    padding: "11px 14px 11px 40px",
                    borderRadius: 6,
                    border: "1px solid #d8d5ce",
                    background: "#fff",
                    color: "#2c2a26",
                    fontSize: 14,
                    fontFamily: "'Libre Franklin', sans-serif",
                    fontWeight: 400,
                    outline: "none",
                    boxSizing: "border-box",
                    transition: "border-color 0.2s",
                  }}
                  onFocus={(e) => e.target.style.borderColor = "#1e3a5c"}
                  onBlur={(e) => e.target.style.borderColor = "#d8d5ce"}
                />
              </div>
              <select
                value={sort}
                onChange={(e) => setSort(e.target.value)}
                style={{
                  padding: "11px 32px 11px 14px",
                  borderRadius: 6,
                  border: "1px solid #d8d5ce",
                  background: "#fff",
                  color: "#4a4840",
                  fontSize: 13,
                  fontFamily: "'Libre Franklin', sans-serif",
                  cursor: "pointer",
                  outline: "none",
                  WebkitAppearance: "none",
                  MozAppearance: "none",
                  appearance: "none",
                  backgroundImage: "url(\"data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L5 5L9 1' stroke='%239a9690' stroke-width='1.5' stroke-linecap='round'/%3E%3C/svg%3E\")",
                  backgroundRepeat: "no-repeat",
                  backgroundPosition: "right 12px center",
                }}
              >
                {SORT_OPTIONS.map((o) => (
                  <option key={o.value} value={o.value}>{o.label}</option>
                ))}
              </select>
            </div>

            {/* Tag filters */}
            <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(190px, 1fr))", gap: 8, marginBottom: 8 }}>
              {allTags.map((tag) => {
                const active = activeTags.includes(tag);
                const s = getTagStyle(tag);
                return (
                  <button
                    key={tag}
                    onClick={() => toggleTag(tag)}
                    style={{
                      padding: "7px 14px",
                      borderRadius: 20,
                      border: "1px solid " + (active ? s.border : "#d0cdc6"),
                      background: active ? s.bg : "transparent",
                      color: active ? s.text : "#8a8680",
                      fontSize: 12.5,
                      fontFamily: "'Libre Franklin', sans-serif",
                      cursor: "pointer",
                      transition: "all 0.2s",
                      fontWeight: active ? 600 : 400,
                      textAlign: "center",
                    }}
                  >
                    {tag}
                  </button>
                );
              })}
            </div>
            {activeTags.length > 0 && (
              <div style={{ marginBottom: 8 }}>
                <button
                  onClick={() => setActiveTags([])}
                  style={{
                    padding: "5px 14px",
                    borderRadius: 20,
                    border: "1px solid #d0cdc6",
                    background: "transparent",
                    color: "#1e3a5c",
                    fontSize: 12,
                    fontFamily: "'Libre Franklin', sans-serif",
                    fontWeight: 500,
                    cursor: "pointer",
                  }}
                >
                  Clear all &times;
                </button>
              </div>
            )}

            <p style={{ fontSize: 12, color: "#9a9690", margin: "12px 0 0", fontFamily: "'Libre Franklin', sans-serif" }}>
              Showing {filtered.length} of {papers.length} papers
            </p>
          </div>

          {/* Cards */}
          <div className="dashboard-container cards-grid" style={{ maxWidth: 1600, margin: "0 auto", paddingTop: 24, paddingBottom: 60 }}>
            {filtered.length === 0 && (
              <div style={{ textAlign: "center", padding: "80px 20px", color: "#9a9690", fontSize: 15, fontFamily: "'Libre Franklin', sans-serif", gridColumn: "1 / -1" }}>
                <p style={{ fontSize: 32, marginBottom: 12 }}>&empty;</p>
                No papers match your current filters.
              </div>
            )}

            {filtered.map((paper, idx) => {
              const expanded = expandedId === paper.id;
              return (
                <div
                  key={paper.id}
                  onClick={() => setExpandedId(expanded ? null : paper.id)}
                  style={{
                    background: paper.pinned ? "#fffdf5" : "#fff",
                    border: "1px solid " + (paper.pinned ? "#e8d98a" : "#e4e1da"),
                    borderRadius: 8,
                    padding: "24px 28px",
                    cursor: "pointer",
                    transition: "all 0.25s ease",
                    borderLeft: "3px solid " + (paper.pinned ? "#c9a800" : getTagStyle(paper.tags[0]).border),
                    animation: "fadeSlideIn 0.4s ease both",
                    animationDelay: (idx * 40) + "ms",
                    boxShadow: paper.pinned ? "0 2px 8px rgba(180,150,0,0.10)" : "0 1px 3px rgba(0,0,0,0.04)",
                  }}
                  onMouseEnter={(e) => {
                    e.currentTarget.style.boxShadow = paper.pinned ? "0 4px 14px rgba(180,150,0,0.18)" : "0 2px 8px rgba(0,0,0,0.07)";
                    e.currentTarget.style.borderColor = paper.pinned ? "#d4b800" : "#ccc9c2";
                  }}
                  onMouseLeave={(e) => {
                    e.currentTarget.style.boxShadow = paper.pinned ? "0 2px 8px rgba(180,150,0,0.10)" : "0 1px 3px rgba(0,0,0,0.04)";
                    e.currentTarget.style.borderColor = paper.pinned ? "#e8d98a" : "#e4e1da";
                  }}
                >
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                      <span style={{ fontFamily: "'Libre Franklin', sans-serif", fontSize: 11, letterSpacing: "1.5px", textTransform: "uppercase", color: "#9a9690", fontWeight: 500 }}>{paper.journal}</span>
                      {paper.pinned && (
                        <span style={{ fontFamily: "'Libre Franklin', sans-serif", fontSize: 10, letterSpacing: "1.5px", textTransform: "uppercase", fontWeight: 700, color: "#8a6a00", background: "#fef3c0", border: "1px solid #e8d98a", borderRadius: 4, padding: "2px 7px" }}>Penn Research</span>
                      )}
                    </div>
                    <span style={{ fontFamily: "'Source Serif 4', serif", fontSize: 17, fontWeight: 700, color: getTagStyle(paper.tags[0]).border, opacity: 0.55 }}>{paper.year}</span>
                  </div>

                  <h2 style={{ fontFamily: "'Source Serif 4', Georgia, serif", fontSize: "clamp(17px, 2vw, 20px)", fontWeight: 600, lineHeight: 1.35, margin: "0 0 8px" }}>
                    {paper.url ? (
                      <a
                        href={paper.url}
                        target="_blank"
                        rel="noopener noreferrer"
                        onClick={e => e.stopPropagation()}
                        style={{ color: "#1a1a18", textDecoration: "underline", textDecorationColor: "#c0bdb7", textUnderlineOffset: 3, transition: "color 0.15s" }}
                        onMouseEnter={e => { e.currentTarget.style.color = "#1e3a5c"; e.currentTarget.style.textDecorationColor = "#1e3a5c"; }}
                        onMouseLeave={e => { e.currentTarget.style.color = "#1a1a18"; e.currentTarget.style.textDecorationColor = "#c0bdb7"; }}
                      >{paper.title}</a>
                    ) : paper.title}
                  </h2>

                  <p style={{ fontFamily: "'Libre Franklin', sans-serif", fontSize: 13, color: "#8a8680", margin: "0 0 14px", lineHeight: 1.4, fontWeight: 400 }}>{paper.authors}</p>

                  <p style={{ fontFamily: "'Source Serif 4', Georgia, serif", fontSize: 14, color: expanded ? "#3a3830" : "#6b6860", lineHeight: 1.75, margin: "0 0 16px", maxHeight: expanded ? 600 : 120, overflow: "hidden", transition: "all 0.35s ease" }}>
                    {paper.summary}
                  </p>

                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                    <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
                      {paper.tags.map((tag) => {
                        const s = getTagStyle(tag);
                        return (
                          <span key={tag} style={{ padding: "3px 10px", borderRadius: 12, background: s.bg, color: s.text, fontSize: 11, fontWeight: 500, fontFamily: "'Libre Franklin', sans-serif", border: "1px solid " + s.border + "30" }}>{tag}</span>
                        );
                      })}
                    </div>
                    <span style={{ fontSize: 11, color: "#b0ada6", transition: "transform 0.3s", transform: expanded ? "rotate(180deg)" : "rotate(0)", display: "inline-block" }}>{"\u25BC"}</span>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<Dashboard />);
  </script>

  <script>
    // Auto-resize: sends page height to parent iframe so WordPress can resize accordingly
    function sendHeight() {
      var height = document.documentElement.scrollHeight;
      window.parent.postMessage({ frameHeight: height }, "*");
    }
    // Send on load
    window.addEventListener("load", sendHeight);
    // Send whenever content changes (e.g. cards expand/collapse)
    var observer = new ResizeObserver(sendHeight);
    observer.observe(document.body);
  </script>
</body>
</html>
